name: Update README Dynamic Sections

on:
  schedule:
    - cron: "0 3 * * *"    # once a day at 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 1) Recent activity -> Quest Log block
      - name: Update recent activity (Quest Log)
        run: |
          EVENTS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/users/${{ github.repository_owner }}/events/public?per_page=10")
          
          QUEST_LOG=""
          INDEX=1
          while IFS= read -r event; do
            TYPE=$(echo "$event" | jq -r '.type')
            REPO=$(echo "$event" | jq -r '.repo.name')
            CREATED=$(echo "$event" | jq -r '.created_at' | cut -d'T' -f1)
            
            case $TYPE in
              PushEvent) EMOJI="🚀"; ACTION="Pushed to"; ;;
              PullRequestEvent) 
                STATE=$(echo "$event" | jq -r '.payload.action')
                if [ "$STATE" = "closed" ]; then
                  MERGED=$(echo "$event" | jq -r '.payload.pull_request.merged')
                  if [ "$MERGED" = "true" ]; then
                    EMOJI="✅"; ACTION="Merged PR in"
                  else
                    EMOJI="❌"; ACTION="Closed PR in"
                  fi
                else
                  EMOJI="🔀"; ACTION="Opened PR in"
                fi
                ;;
              IssuesEvent)
                STATE=$(echo "$event" | jq -r '.payload.action')
                if [ "$STATE" = "closed" ]; then
                  EMOJI="✅"; ACTION="Closed issue in"
                else
                  EMOJI="📋"; ACTION="Opened issue in"
                fi
                ;;
              IssueCommentEvent) EMOJI="💬"; ACTION="Commented on issue in"; ;;
              PullRequestReviewEvent) EMOJI="👀"; ACTION="Reviewed PR in"; ;;
              CreateEvent)
                REF_TYPE=$(echo "$event" | jq -r '.payload.ref_type')
                if [ "$REF_TYPE" = "branch" ]; then
                  EMOJI="🌿"; ACTION="Created branch in"
                else
                  EMOJI="🏷"; ACTION="Created tag in"
                fi
                ;;
              DeleteEvent) EMOJI="🔥"; ACTION="Deleted branch in"; ;;
              ForkEvent) EMOJI="🍴"; ACTION="Forked"; ;;
              ReleaseEvent) EMOJI="📦"; ACTION="Released in"; ;;
              WatchEvent) EMOJI="⭐"; ACTION="Starred"; ;;
              *) EMOJI="📝"; ACTION="$TYPE in"; ;;
            esac
            
            QUEST_LOG="${QUEST_LOG}- ${EMOJI} ${ACTION} [\`${REPO}\`](https://github.com/${REPO}) on ${CREATED}\n"
            INDEX=$((INDEX + 1))
            [ $INDEX -gt 6 ] && break
          done < <(echo "$EVENTS" | jq -c '.[]')
          
          if [ -z "$QUEST_LOG" ]; then
            QUEST_LOG="- 📝 No recent activity found"
          fi
          
          printf "%b" "$QUEST_LOG" > /tmp/quest_log.md
          
          awk '
            /<!-- QUEST_LOG_START -->/ { print; system("cat /tmp/quest_log.md"); next }
            /<!-- QUEST_LOG_END -->/ { print; next }
            /<!-- QUEST_LOG_START -->/,/<!-- QUEST_LOG_END -->/ { next }
            { print }
          ' README.md > /tmp/README.md && mv /tmp/README.md README.md
        env:
          GITHUB_TOKEN: ${{ secrets.RM_TOKEN }}

      # 2) Custom RPG XP / Achievements engine (see docs/SETUP.md)
      - name: Compute RPG stats + achievements
        run: |
          python3 scripts/compute_rpg_stats.py
        env:
          GH_TOKEN: ${{ secrets.RM_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}

      - name: Commit updated stats
        run: |
          git config user.name "readme-bot"
          git config user.email "actions@github.com"
          git add assets/rpg-stats.json README.md
          git diff --cached --quiet || git commit -m "chore: sync RPG stats + achievements [skip ci]"
          git push
